spring:
  application:
    name: lms-system
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/lms_system
    username: myuser
    password: 12345
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/db.changelog-master.yaml

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  info:
    title: LMS System API
    description: API для управления обучением (студенты, группы, курсы, преподаватели, расписание)
    version: 0.5.0
