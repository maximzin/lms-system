databaseChangeLog:
  - changeSet:
      id: 1-create-course-group
      author: you
      changes:
        - createTable:
            tableName: course_group
            columns:
              - column:
                  name: course_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_course_group_course
                    references: course(id)
              - column:
                  name: group_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_course_group_study_group
                    references: study_group(id)
        - addPrimaryKey:
            tableName: course_group
            columnNames: course_id, group_id
            constraintName: pk_course_group