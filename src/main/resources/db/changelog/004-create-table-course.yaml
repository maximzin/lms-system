databaseChangeLog:
  - changeSet:
      id: 1-create-course
      author: max zinoviev
      changes:
        - createTable:
            tableName: course
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_course
              - column:
                  name: name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: teacher_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_course_teacher
                    references: teacher(id)