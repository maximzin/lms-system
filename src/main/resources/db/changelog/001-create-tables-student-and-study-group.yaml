databaseChangeLog:
  - changeSet:
      id: 1-create-student
      author: max zinoviev
      changes:
        - createTable:
            tableName: student
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_student
                    nullable: false
              - column:
                  name: first_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: UUID
                  constraints:
                    nullable: true
  - changeSet:
      id: 2-create-study-group
      author: max zinoviev
      changes:
        - createTable:
            tableName: study_group
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_study_group
                    nullable: false
              - column:
                  name: name
                  type: text
                  constraints:
                    nullable: false
  - changeSet:
      id: 3-create-fk-student-to-study-group
      author: max zinoviev
      changes:
        - addForeignKeyConstraint:
            baseTableName: student
            baseColumnNames: group_id
            referencedTableName: study_group
            referencedColumnNames: id
            constraintName: fk_student_study_group
