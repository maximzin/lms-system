databaseChangeLog:
  - changeSet:
      id: 1-create-teacher
      author: max zinoviev
      changes:
        - createTable:
            tableName: teacher
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_teacher
              - column:
                  name: first_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: text
                  constraints:
                    nullable: false